name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Ragas mode: mock or live"
        required: false
        default: "live"
        type: choice
        options:
          - mock
          - live

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

      - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e . pytest

      - name: Run unit and integration tests
      run: pytest -q

  ragas-quality:
    needs: tests
    runs-on: ubuntu-latest
    env:
      EVAL_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'mock' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

      - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e . pytest

      - name: Run ragas quality gate
      run: |
        PYTHONPATH=src python -m summarizer.ragas_pipeline --mode "${EVAL_MODE}" --goldens tests/goldens.json --output artifacts/ragas

      - name: Validate ragas tests
      run: pytest -q tests/test_ragas_pipeline.py

      - name: Upload ragas artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ragas-report
        path: artifacts/ragas/
